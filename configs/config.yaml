defaults:
  - model: qwen25_05b          # safe default for Mac dev; override on cloud
  - emotion: joy                 # primary emotions: admiration, joy, loathing, sadness (neutral is reference)
  - derivation: story            # story (primary, 2026-06-13) | caa (secondary baseline)
  - _self_

# Paths (relative to repo root; override per environment if needed)
paths:
  data_dir: data/public
  activations_dir: activations
  probes_dir: probes
  steering_vectors_dir: steering_vectors
  results_dir: results
  figures_dir: figures

# Activation extraction settings
extract:
  token_position: last          # "last" | "all" | int
  batch_size: 8                 # prompts per forward pass
  dtype: float16                # storage dtype for .npz

# Hydra output dir
hydra:
  run:
    dir: outputs/${now:%Y-%m-%d_%H-%M-%S}
