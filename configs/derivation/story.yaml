# Paper-faithful story-based emotion-vector derivation
# (Sofroniew et al. 2026, "Emotion Concepts and their Function in a
# Large Language Model" — docs/EmotionConcepts.pdf).
#
# v_e = mean_e(pooled_story_acts) - mean_over_emotions(mean_e(pooled_story_acts))
# v_e <- project_out(v_e, neutral_PCs(>=var_threshold))
#
# at every candidate layer. Layer choice is post-hoc (downstream eval).
#
# Activation source: synthetic stories generated by the target model
# itself, one corpus per model. See scripts/generate_emotion_stories.py.

method: story

# Token-position pooling for activation extraction.
pool: mean_from_token         # mean across positions >= pool_start_token
pool_start_token: 50

# Cross-emotion centering (vs single neutral set in CAA).
center: cross_emotion_mean

# Confound removal: project orthogonal to top PCs of neutral activations.
project_out:
  source: neutral_pcs
  var_threshold: 0.5

# Story corpus generation (topic-matched, paper-style). Every emotion AND
# neutral are generated over the SAME topic list, `stories_per_topic` stories
# per topic, so topic distribution is identical across emotions (it cannot
# separate them). Corpus size per emotion = stories_per_topic x n_topics.
# `data/public/story_topics.txt` currently has ~45 topics → ~315 stories at 7.
stories_per_topic: 7
max_topics: null              # cap the topic list (e.g. for smoke tests); null = all
generator:
  max_new_tokens: 200
  temperature: 0.7
  do_sample: true
  min_story_tokens: 60        # stories tokenizing below this are dropped
